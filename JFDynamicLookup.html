<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JotForm Table Lookup Widget</title>

  <!-- JotForm Widget API - must be first -->

  <script src="https://js.jotform.com/JotFormCustomWidget.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: transparent;
      padding: 4px 0;
    }
    .loading-bar {
      display: flex; align-items: center; gap: 8px;
      color: #9ca3af; font-size: 13px; padding: 10px 0;
    }
    .spinner {
      width: 15px; height: 15px;
      border: 2px solid #e5e7eb; border-top-color: #6366f1;
      border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box { color: #ef4444; font-size: 13px; padding: 8px 0; }
    .select-wrap { position: relative; }
    select {
      width: 100%; padding: 10px 36px 10px 12px;
      border: 1px solid #d1d5db; border-radius: 6px;
      background: #fff; font-size: 14px; color: #111827;
      appearance: none; cursor: pointer; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    select:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.15); }
    .chevron {
      pointer-events: none; position: absolute; right: 10px;
      top: 50%; transform: translateY(-50%); color: #9ca3af;
    }
    .hidden { display: none !important; }
  </style>

</head>
<body>

  <div id="loadingState" class="loading-bar hidden">
    <div class="spinner"></div><span>Loading options…</span>
  </div>
  <div id="errorState" class="error-box hidden"></div>

  <div id="dropdownWrap" class="select-wrap hidden">
    <select id="mainSelect" onchange="onSelectChange(this)">
      <option value="">Select an option…</option>
    </select>
    <svg class="chevron" width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 011.06 0L10 11.94l3.72-3.72a.75.75 0 111.06 1.06l-4.25 4.25a.75.75 0 01-1.06 0L5.22 9.28a.75.75 0 010-1.06z" clip-rule="evenodd"/>
    </svg>
  </div>

  <input type="hidden" id="hiddenValue" name="lookupValue" value="" />

<script>
  let lookupMap = {};

  // ── Widget Settings Manifest ──────────────────
  // JotForm reads this to generate the settings panel
  JFCustomWidget.settingsSection([
    {
      type: "text",
      title: "JotForm API Key",
      name: "apiKey",
      description: "Your JotForm API key (My Account → API)"
    },
    {
      type: "text",
      title: "Table / Form ID",
      name: "tableId",
      description: "The ID from your table URL: jotform.com/tables/TABLE_ID"
    },
    {
      type: "text",
      title: "Display Column Name",
      name: "displayCol",
      description: "Column header the user will see in the dropdown (case-sensitive)"
    },
    {
      type: "text",
      title: "Hidden Value Column Name",
      name: "lookupCol",
      description: "Column header whose value gets submitted (case-sensitive)"
    },
    {
      type: "text",
      title: "Placeholder Text",
      name: "placeholder",
      description: "Default text shown before user selects"
    }
  ]);

  // ── Ready: JotForm passes settings in ────────
  JFCustomWidget.subscribe("ready", function () {
    const apiKey      = JFCustomWidget.getWidgetSetting("apiKey")      || "";
    const tableId     = JFCustomWidget.getWidgetSetting("tableId")     || "";
    const displayCol  = JFCustomWidget.getWidgetSetting("displayCol")  || "";
    const lookupCol   = JFCustomWidget.getWidgetSetting("lookupCol")   || "";
    const placeholder = JFCustomWidget.getWidgetSetting("placeholder") || "Select an option…";

    if (apiKey && tableId && displayCol && lookupCol) {
      loadTable(apiKey, tableId, displayCol, lookupCol, placeholder);
    } else {
      showError("Configure this widget: click it in the builder and fill in the settings on the right panel.");
    }
  });

  // ── Submit handler ────────────────────────────
  JFCustomWidget.subscribe("submit", function () {
    const val = document.getElementById("hiddenValue").value;
    JFCustomWidget.sendSubmit({ value: val, valid: val !== "" });
  });

  // ── Fetch rows from JotForm Table ─────────────
  async function loadTable(apiKey, tableId, displayCol, lookupCol, placeholder) {
    showLoading();
    try {
      const url = `https://api.jotform.com/form/${tableId}/submissions` +
                  `?apiKey=${encodeURIComponent(apiKey)}&limit=1000&orderby=created_at`;
      const res  = await fetch(url);
      const json = await res.json();

      if (json.responseCode !== 200) throw new Error(json.message || `API error ${json.responseCode}`);

      const subs = (json.content || []).filter(s => s.status !== "DELETED");
      if (!subs.length) throw new Error("No rows found. Check the Table ID or add rows first.");

      const firstAnswers = subs[0].answers || {};
      let displayKey = null, lookupKey = null;
      for (const [qid, ans] of Object.entries(firstAnswers)) {
        const name = (ans.name || "").toLowerCase();
        if (name === displayCol.toLowerCase()) displayKey = qid;
        if (name === lookupCol.toLowerCase())  lookupKey  = qid;
      }
      if (!displayKey) throw new Error(`Column "${displayCol}" not found. Available: ${Object.values(firstAnswers).map(a=>a.name).filter(Boolean).join(", ")}`);
      if (!lookupKey)  throw new Error(`Column "${lookupCol}" not found. Available: ${Object.values(firstAnswers).map(a=>a.name).filter(Boolean).join(", ")}`);

      lookupMap = {};
      const sel = document.getElementById("mainSelect");
      sel.innerHTML = `<option value="">${placeholder}</option>`;
      for (const sub of subs) {
        const display = extractValue((sub.answers||{})[displayKey]);
        const hidden  = extractValue((sub.answers||{})[lookupKey]);
        if (!display) continue;
        lookupMap[display] = hidden;
        const opt = document.createElement("option");
        opt.value = display; opt.textContent = display;
        sel.appendChild(opt);
      }
      showDropdown(placeholder);

    } catch (err) {
      showError(err.message);
    }
  }

  function extractValue(ans) {
    if (!ans) return "";
    const v = ans.answer ?? ans.prettyFormat ?? "";
    if (typeof v === "string")  return v.trim();
    if (Array.isArray(v))       return v.join(", ").trim();
    if (typeof v === "object")  return Object.values(v).filter(Boolean).join(" ").trim();
    return String(v).trim();
  }

  function onSelectChange(sel) {
    const hidden = sel.value ? (lookupMap[sel.value] || "") : "";
    document.getElementById("hiddenValue").value = hidden;
    JFCustomWidget.sendData({ value: hidden, valid: hidden !== "" });
  }

  function showLoading() {
    document.getElementById("loadingState").classList.remove("hidden");
    document.getElementById("errorState").classList.add("hidden");
    document.getElementById("dropdownWrap").classList.add("hidden");
  }
  function showError(msg) {
    document.getElementById("errorState").textContent = "⚠️ " + msg;
    document.getElementById("errorState").classList.remove("hidden");
    document.getElementById("loadingState").classList.add("hidden");
    document.getElementById("dropdownWrap").classList.add("hidden");
  }
  function showDropdown(placeholder) {
    document.getElementById("mainSelect").options[0].textContent = placeholder || "Select an option…";
    document.getElementById("dropdownWrap").classList.remove("hidden");
    document.getElementById("loadingState").classList.add("hidden");
    document.getElementById("errorState").classList.add("hidden");
    JFCustomWidget.requestFrameResize({ height: 50 });
  }
</script>

</body>
</html>
