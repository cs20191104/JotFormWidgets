<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JotForm Table Lookup Widget</title>
  <script src="https://js.jotform.com/JotFormCustomWidget.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
      padding: 6px;
    }
    .msg { font-size: 13px; color: #6b7280; padding: 8px 0; }
    .err { font-size: 13px; color: #ef4444; padding: 8px 0; }
    .loading-bar {
      display: flex; align-items: center; gap: 8px;
      color: #9ca3af; font-size: 13px; padding: 8px 0;
    }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid #e5e7eb; border-top-color: #6366f1;
      border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .select-wrap { position: relative; }
    select {
      width: 100%; padding: 10px 36px 10px 12px;
      border: 1px solid #d1d5db; border-radius: 6px;
      background: #fff; font-size: 14px; color: #111827;
      appearance: none; cursor: pointer; outline: none;
    }
    select:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.15); }
    .chevron {
      pointer-events: none; position: absolute; right: 10px;
      top: 50%; transform: translateY(-50%); color: #9ca3af;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="msg"    class="msg">Starting up...</div>
  <div id="loader" class="loading-bar hidden"><div class="spinner"></div><span>Loading options…</span></div>
  <div id="err"    class="err hidden"></div>
  <div id="wrap"   class="select-wrap hidden">
    <select id="sel" onchange="onChange(this)">
      <option value="">Select an option…</option>
    </select>
    <svg class="chevron" width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 011.06 0L10 11.94l3.72-3.72a.75.75 0 111.06 1.06l-4.25 4.25a.75.75 0 01-1.06 0L5.22 9.28a.75.75 0 010-1.06z" clip-rule="evenodd"/>
    </svg>
  </div>
  <input type="hidden" id="hiddenVal" value="" />

<script>
  var lookupMap = {};

  function setMsg(t)  { show('msg'); document.getElementById('msg').textContent = t; }
  function setErr(t)  { show('err'); document.getElementById('err').textContent = '⚠️ ' + t; }
  function setLoad()  { show('loader'); }
  function setDrop(p) {
    document.getElementById('sel').options[0].textContent = p || 'Select an option…';
    show('wrap');
    try { JFCustomWidget.requestFrameResize({ height: 52 }); } catch(e) {}
  }

  function show(id) {
    ['msg','loader','err','wrap'].forEach(function(i) {
      document.getElementById(i).classList[i === id ? 'remove' : 'add']('hidden');
    });
  }

  // Init after DOM ready
  document.addEventListener('DOMContentLoaded', function() {
    setMsg('Widget loaded. Waiting for JotForm...');

    try {
      if (typeof JFCustomWidget === 'undefined') {
        setMsg('Loaded OK — add to JotForm form to configure.');
        return;
      }

      JFCustomWidget.subscribe('ready', function() {
        try {
          var apiKey  = JFCustomWidget.getWidgetSetting('apiKey')      || '';
          var tableId = JFCustomWidget.getWidgetSetting('tableId')     || '';
          var dispCol = JFCustomWidget.getWidgetSetting('displayCol')  || '';
          var lookCol = JFCustomWidget.getWidgetSetting('lookupCol')   || '';
          var ph      = JFCustomWidget.getWidgetSetting('placeholder') || 'Select an option…';

          setMsg('Settings received. apiKey=' + (apiKey ? 'YES' : 'NO') +
                 ' tableId=' + (tableId || 'MISSING') +
                 ' displayCol=' + (dispCol || 'MISSING') +
                 ' lookupCol=' + (lookCol || 'MISSING'));

          if (!tableId || !dispCol || !lookCol) {
            setErr('Missing settings. Please fill in Table ID, Display Column and Hidden Value Column in the widget settings panel.');
            return;
          }

          if (!apiKey) {
            setErr('Missing API Key. Please add it in the widget settings panel.');
            return;
          }

          loadTable(apiKey, tableId, dispCol, lookCol, ph);

        } catch(e) {
          setErr('Ready handler error: ' + e.message);
        }
      });

      JFCustomWidget.subscribe('submit', function() {
        var val = document.getElementById('hiddenVal').value;
        JFCustomWidget.sendSubmit({ value: val, valid: val !== '' });
      });

    } catch(e) {
      setErr('Init error: ' + e.message);
    }
  });

  async function loadTable(apiKey, tableId, dispCol, lookCol, ph) {
    setLoad();
    try {
      var url = 'https://api.jotform.com/form/' + tableId +
                '/submissions?apiKey=' + encodeURIComponent(apiKey) +
                '&limit=1000&orderby=created_at';

      var res  = await fetch(url);
      var json = await res.json();

      if (json.responseCode !== 200) throw new Error(json.message || 'API error ' + json.responseCode);

      var subs = (json.content || []).filter(function(s) { return s.status !== 'DELETED'; });
      if (!subs.length) throw new Error('No rows found. Check the Table ID.');

      var firstAnswers = subs[0].answers || {};
      var displayKey = null, lookupKey = null;

      Object.keys(firstAnswers).forEach(function(qid) {
        var name = (firstAnswers[qid].name || '').toLowerCase();
        if (name === dispCol.toLowerCase()) displayKey = qid;
        if (name === lookCol.toLowerCase()) lookupKey  = qid;
      });

      if (!displayKey) {
        var cols = Object.values(firstAnswers).map(function(a){ return a.name; }).filter(Boolean).join(', ');
        throw new Error('Column "' + dispCol + '" not found. Available: ' + cols);
      }
      if (!lookupKey) {
        var cols = Object.values(firstAnswers).map(function(a){ return a.name; }).filter(Boolean).join(', ');
        throw new Error('Column "' + lookCol + '" not found. Available: ' + cols);
      }

      lookupMap = {};
      var sel = document.getElementById('sel');
      sel.innerHTML = '<option value="">' + ph + '</option>';

      subs.forEach(function(sub) {
        var display = extractValue((sub.answers||{})[displayKey]);
        var hidden  = extractValue((sub.answers||{})[lookupKey]);
        if (!display) return;
        lookupMap[display] = hidden;
        var opt = document.createElement('option');
        opt.value = display; opt.textContent = display;
        sel.appendChild(opt);
      });

      setDrop(ph);

    } catch(e) {
      setErr(e.message);
    }
  }

  function extractValue(ans) {
    if (!ans) return '';
    var v = ans.answer !== undefined ? ans.answer : (ans.prettyFormat || '');
    if (typeof v === 'string')  return v.trim();
    if (Array.isArray(v))       return v.join(', ').trim();
    if (typeof v === 'object')  return Object.values(v).filter(Boolean).join(' ').trim();
    return String(v).trim();
  }

  function onChange(sel) {
    var hidden = sel.value ? (lookupMap[sel.value] || '') : '';
    document.getElementById('hiddenVal').value = hidden;
    try { JFCustomWidget.sendData({ value: hidden, valid: hidden !== '' }); } catch(e) {}
  }
</script>

</body>
</html>
